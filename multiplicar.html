<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabla del 3 - 8-Bit Edition</title>
  <!-- Fuente Pixel Art de Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="multiplicar.css">
</head>
<body>

  <main class="contenedor-principal">
    
    <!-- Fila Superior: Botón PROBAR -->
    <header class="header-top">
      <button class="btn-probar">PROBAR</button>
    </header>

    <!-- Título de la tabla -->
    <h1 class="titulo">TABLA DEL 3</h1>

    <!-- Grid de Tarjetas -->
    <section class="grid-tabla">
      <div class="tarjeta-operacion">
        <span class="multiplicacion">3x1</span>
        <span class="resultado">03</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">3x2</span>
        <span class="resultado">06</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">3x3</span>
        <span class="resultado">09</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">3x4</span>
        <span class="resultado">12</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">3x5</span>
        <span class="resultado">15</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">3x6</span>
        <span class="resultado">18</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">3x7</span>
        <span class="resultado">21</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">3x8</span>
        <span class="resultado">24</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">3x9</span>
        <span class="resultado">27</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">3x10</span>
        <span class="resultado">30</span>
      </div>
    </section>

  </main>

</body>
</html>
