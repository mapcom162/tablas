<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabla del 3 - 8-Bit Edition</title>
  <!-- Fuente Pixel Art de Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="multiplicar.css">
  <script src="multiplicar.js"></script>
</head>
<body>

  <main class="contenedor-principal">
    
    <!-- Fila Superior: Botón PROBAR -->
    <header class="header-top">
      <button class="btn-probar" onclick="generarTablas()">PROBAR</button>
    </header>

    <!-- NUEVA CAJA DE TEXTO RETRO -->
    <div class="contenedor-input">
      <input type="number" id="txtTabla" class="input-retro" placeholder="NUM">
    </div>

    <!-- Título de la tabla -->
    <h1 class="titulo" id="titulo">Tabla del 1</h1>

    <!-- Grid de Tarjetas -->
    <div class="grid-tabla" id="contenedor">
      <div class="tarjeta-operacion" >
        <span class="multiplicacion">1x1</span>
        <span class="resultado">1</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">1x2</span>
        <span class="resultado">2</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">1x3</span>
        <span class="resultado">3</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">1x4</span>
        <span class="resultado">4</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">1x5</span>
        <span class="resultado">5</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">1x6</span>
        <span class="resultado">6</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">1x7</span>
        <span class="resultado">7</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">1x8</span>
        <span class="resultado">8</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">1x9</span>
        <span class="resultado">9</span>
      </div>
      <div class="tarjeta-operacion">
        <span class="multiplicacion">1x10</span>
        <span class="resultado">10</span>
      </div>
    </div>

  </main>

</body>
</html>
